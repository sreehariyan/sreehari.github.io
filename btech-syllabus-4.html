<meta charset="UTF-8"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Clash+Display:wght@400;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #141416;
    --card: #1a1a1f;
    --card-hover: #1f1f26;
    --accent: #e8b84b;
    --accent-dim: rgba(232,184,75,0.12);
    --text: #f2f0ec;
    --text-secondary: #9a9898;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(232,184,75,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle noise texture */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.4;
  }

  .container { max-width: 1080px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

  /* Header */
  header { padding: 60px 0 20px; text-align: center; }
  .batch-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent-dim); border: 1px solid rgba(232,184,75,0.25);
    color: var(--accent); font-size: 11px; font-weight: 500;
    letter-spacing: 2.5px; padding: 6px 16px; border-radius: 100px;
    margin-bottom: 28px; text-transform: uppercase;
  }
  .batch-tag::before { content: '●'; font-size: 7px; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -1px;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #f2f0ec 0%, #9a9898 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  h1 em {
    font-style: italic;
    background: linear-gradient(135deg, var(--accent) 0%, #f5d07a 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 1px;
    margin-bottom: 50px;
  }

  /* Year Tabs */
  .year-tabs {
    display: flex; justify-content: center; gap: 8px;
    margin: 0 0 52px; flex-wrap: wrap;
  }
  .year-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.25s;
    border-radius: 100px;
    letter-spacing: 0.3px;
  }
  .year-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .year-btn.active { background: var(--accent); border-color: var(--accent); color: #0c0c0e; font-weight: 600; }

  /* Sections */
  .subjects-section { display: none; }
  .subjects-section.active { display: block; animation: fadeUp 0.4s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .section-label {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 28px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .section-label-num {
    font-size: 0.7rem; font-weight: 500; letter-spacing: 3px;
    color: var(--accent); text-transform: uppercase;
    font-family: 'DM Sans', sans-serif;
  }
  .section-label-text {
    font-size: 0.7rem; font-weight: 400; letter-spacing: 2px;
    color: var(--text-secondary); text-transform: uppercase;
  }

  /* Subject Grid */
  .subjects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 14px;
    margin-bottom: 60px;
  }

  .subject-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .subject-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,184,75,0), transparent);
    transition: background 0.3s;
  }
  .subject-card:hover {
    border-color: var(--border-hover);
    background: var(--card-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }
  .subject-card:hover::before {
    background: linear-gradient(90deg, transparent, rgba(232,184,75,0.4), transparent);
  }

  .subject-name {
    font-size: 0.95rem;
    font-weight: 500;
    margin-bottom: 4px;
    color: var(--text);
    line-height: 1.4;
  }
  .subject-type {
    font-size: 0.72rem;
    color: var(--text-secondary);
    font-weight: 400;
    margin-bottom: 18px;
    letter-spacing: 0.5px;
  }

  /* File buttons — slim and elegant */
  .file-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    padding: 8px 12px;
    margin-bottom: 6px;
    text-decoration: none;
    transition: all 0.2s;
  }
  .file-btn:hover {
    border-color: rgba(232,184,75,0.5);
    background: var(--accent-dim);
    color: var(--accent);
  }
  .file-btn .dl-icon {
    width: 22px; height: 22px; border-radius: 5px;
    background: var(--accent-dim);
    border: 1px solid rgba(232,184,75,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--accent); flex-shrink: 0;
    transition: background 0.2s;
  }
  .file-btn:hover .dl-icon { background: rgba(232,184,75,0.25); }
  .file-btn .fl { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Coming soon styles */
  .coming-soon {
    font-size: 0.75rem;
    color: var(--text-secondary);
    font-weight: 300;
    opacity: 0.6;
    font-style: italic;
  }
  .coming-soon-card {
    background: var(--card);
    border: 1px dashed rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 48px 24px;
    text-align: center;
    grid-column: 1 / -1;
  }
  .coming-soon-card .cs-icon { font-size: 2rem; display: block; margin-bottom: 12px; opacity: 0.5; }
  .coming-soon-card p { font-size: 0.82rem; color: var(--text-secondary); font-weight: 300; line-height: 1.7; }
  .coming-soon-card strong { color: var(--accent); font-weight: 500; }

  /* Divider */
  .sem-divider {
    font-size: 0.68rem; font-weight: 500; letter-spacing: 2.5px;
    color: var(--text-secondary); text-transform: uppercase;
    margin: 32px 0 16px; opacity: 0.5;
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border);
    padding: 32px 0;
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-secondary);
    font-weight: 300;
  }
  footer strong { color: var(--text); font-weight: 500; }
  .footer-links { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
  .footer-link {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 100px; color: var(--text-secondary);
    font-size: 0.78rem; font-weight: 400;
    padding: 8px 18px; text-decoration: none; transition: all 0.2s;
  }
  .footer-link:hover { border-color: var(--border-hover); color: var(--accent); background: var(--accent-dim); }

  @media (max-width: 600px) {
    .subjects-grid { grid-template-columns: 1fr; }
    h1 { font-size: 3rem; }
  }
</style>

    var sb=s[i];
    if(sb.cs){
      h+='<div class="coming-soon-card"><span class="cs-icon">&#9201;</span><p><strong>Coming Soon</strong><br/>Materials will be added as they become available.</p></div>';
      continue;
    }
    var fh="";
    if(sb.f.length>0){
      for(var j=0;j<sb.f.length;j++){
        fh+='<a class="file-btn" href="'+sb.f[j].u+'" target="_blank"><span class="dl-icon">&#8595;</span><span class="fl">'+sb.f[j].l+'</span></a>';
      }
    } else {
      fh='<span class="coming-soon">No files uploaded yet</span>';
    }
    h+='<div class="subject-card"><div class="subject-name">'+sb.n+'</div><div class="subject-type">'+sb.t+'</div>'+fh+'</div>';
  }
  g.innerHTML=h;
}

buildGrid(1);buildGrid(2);buildGrid(3);buildGrid(4);

function showYear(yr,btn){
  var s=document.querySelectorAll(".subjects-section");
  var b=document.querySelectorAll(".year-btn");
  for(var i=0;i<s.length;i++)s[i].classList.remove("active");
  for(var i=0;i<b.length;i++)b[i].classList.remove("active");
  document.getElementById("year-"+yr).classList.add("active");
  btn.classList.add("active");
}
</script>
